name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      # ubuntu-latest images ship Bazelisk as `bazel`; install if absent
      - name: Ensure Bazelisk
        run: |
          command -v bazel && exit 0
          sudo curl -fsSL -o /usr/local/bin/bazel \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          sudo chmod +x /usr/local/bin/bazel

      - name: Cache Bazel
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/bazel-disk
            ~/.cache/bazel-repo
          # Always-save pattern: cache keys are immutable, so a key that only
          # hashes the lockfile goes stale when outputs change for other
          # reasons (e.g. a toolchain bump in rules_koka). Unique key per run,
          # restore the nearest previous cache.
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock') }}-${{ github.run_id }}
          restore-keys: |
            bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel.lock') }}-
            bazel-

      - name: Tests (interpreters, PEG, fuzz smokes)
        run: bazel test --config=ci //test/... //fuzz/...

      # Rolling differential fuzzing: fresh seeds every run, so coverage
      # accumulates across CI history instead of re-checking one window.
      - name: Differential fuzzing, e1 (25 fresh seeds)
        run: bazel run --config=ci //fuzz:diff -- -- 25 $(( ${{ github.run_number }} * 25 + 100000 )) 25

      - name: Differential fuzzing, e2 (25 fresh seeds)
        run: bazel run --config=ci //fuzz:diff_e2 -- -- 25 $(( ${{ github.run_number }} * 25 + 100000 )) 25

      - name: Differential fuzzing, e3 (25 fresh seeds)
        run: bazel run --config=ci //fuzz:diff_e3 -- -- 25 $(( ${{ github.run_number }} * 25 + 100000 )) 25

      - name: Differential fuzzing, e4 (25 fresh seeds)
        run: bazel run --config=ci //fuzz:diff_e4 -- -- 25 $(( ${{ github.run_number }} * 25 + 100000 )) 20

      - name: Upload fuzz failures
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: fuzz-failures
          path: fuzz-failures/
          if-no-files-found: ignore
